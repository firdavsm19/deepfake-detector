name: PR Review by OpenHands
on:
  pull_request:
    types: [labeled, review_requested]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-review:
    # Only run when "review-this" label is added OR openhands-agent is requested as reviewer
    if: |
      github.event.label.name == 'review-this' ||
      github.event.requested_reviewer.login == 'openhands-agent'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK for composite action
        uses: actions/checkout@v4
        with:
          repository: OpenHands/software-agent-sdk
          ref: main
          sparse-checkout: .github/actions/pr-review   # Only fetch the action folder

      - name: Run PR Review
        uses: ./.github/actions/pr-review              # Local path, not remote
        with:
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          llm-model: "gemini/gemini-2.0-flash"
