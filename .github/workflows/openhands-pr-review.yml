name: PR Review by OpenHands

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install OpenHands
        run: uv tool install openhands --python 3.12

      - name: Run PR Review
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: "openrouter/meta-llama/llama-3-70b-instruct"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          OPENHANDS_SUPPRESS_BANNER: "1"
        run: |
          mkdir -p ~/.openhands

          cat > ~/.openhands/settings.json <<EOF
          {
            "llm_model": "openrouter/meta-llama/llama-3-70b-instruct",
            "llm_api_key": "${LLM_API_KEY}",
            "agent": "CodeActAgent",
            "language": "en"
          }
          EOF

          # Build the task with variables expanded by the shell
          TASK="You are a senior software engineer performing a code review on a GitHub pull request.

          Follow these steps exactly:

          1. Run this command to get the PR diff:
             gh pr diff ${PR_NUMBER} --repo ${REPO}

          2. Run this to get PR metadata:
             gh pr view ${PR_NUMBER} --repo ${REPO}

          3. Carefully analyze every changed file for:
             - Bugs and logic errors
             - Security vulnerabilities
             - Performance issues
             - Code quality and maintainability
             - Architecture or design concerns

          4. Post your review using the GitHub CLI:
             gh pr review ${PR_NUMBER} --repo ${REPO} --comment --body 'YOUR FULL REVIEW HERE'

          IMPORTANT:
          - You MUST run the gh commands above — do not skip any step.
          - Do NOT finish until the review comment has been posted.
          - The GITHUB_TOKEN environment variable is already set for authentication."

          openhands \
            --headless \
            --always-approve \
            --override-with-envs \
            --exit-without-confirmation \
            -t "$TASK"
