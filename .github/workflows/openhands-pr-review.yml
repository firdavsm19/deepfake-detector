name: PR Review by OpenHands

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install OpenHands
        run: uv tool install openhands --python 3.12

      - name: Run PR Review
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: "openrouter/meta-llama/llama-3-70b-instruct"
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          OPENHANDS_SUPPRESS_BANNER: "1"
          TTY_INTERACTIVE: "1"
          TTY_COMPATIBLE: "1"
          TASK: |
            You are a professional senior software engineer performing a pull request review.

            Your task:

            1. Fetch the full diff of PR #${PR_NUMBER} from repository ${REPO}.
            2. Analyze all changed files line by line.
            3. Identify issues:
               - Bugs
               - Security vulnerabilities
               - Performance problems
               - Code quality issues
               - Architecture/design issues

            4. For each issue explain:
               - What is wrong
               - Why it is a problem
               - How to fix it

            5. Post a PR review comment using the GitHub API and GITHUB_TOKEN.

            IMPORTANT:
            - You MUST fetch the PR diff before reviewing.
            - Do NOT stop until the review is posted.

        run: |
          mkdir -p ~/.openhands

          cat > ~/.openhands/settings.json <<EOF
          {
            "llm_model": "openrouter/meta-llama/llama-3-70b-instruct",
            "llm_api_key": "$LLM_API_KEY",
            "agent": "CodeActAgent",
            "language": "en"
          }
          EOF

          openhands \
            --headless \
            --always-approve \
            --override-with-envs \
            --exit-without-confirmation \
            -t "$TASK"
