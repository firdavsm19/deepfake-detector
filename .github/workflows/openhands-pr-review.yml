name: PR Review by OpenHands

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install OpenHands
        run: uv tool install openhands --python 3.12

      - name: Run PR Review
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: "openrouter/meta-llama/llama-3-70b-instruct"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          OPENHANDS_SUPPRESS_BANNER: "1"
        run: |
          mkdir -p ~/.openhands

          # Correct config file name: agent_settings.json (not settings.json)
          cat > ~/.openhands/agent_settings.json <<EOF
          {
            "llm": {
              "model": "openrouter/meta-llama/llama-3-70b-instruct",
              "api_key": "${LLM_API_KEY}"
            }
          }
          EOF

          # Write task to a file to avoid quoting/escaping issues
          cat > /tmp/task.txt <<EOF
          You are a senior software engineer performing a code review on a GitHub pull request.

          Follow these steps exactly and do not stop until all steps are complete:

          Step 1 - Get the PR diff by running:
          gh pr diff ${PR_NUMBER} --repo ${REPO}

          Step 2 - Get PR metadata by running:
          gh pr view ${PR_NUMBER} --repo ${REPO}

          Step 3 - Analyze the changes for bugs, security issues, performance problems, and code quality issues.

          Step 4 - Post your review by running:
          gh pr review ${PR_NUMBER} --repo ${REPO} --comment --body "## AI Code Review

          <your full review here>"

          You MUST complete all 4 steps. Do not call finish until step 4 is done.
          EOF

          openhands --headless --override-with-envs -f /tmp/task.txt
