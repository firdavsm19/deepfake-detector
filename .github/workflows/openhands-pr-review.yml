name: PR Review by OpenHands

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, review_requested]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install OpenHands SDK
        run: |
          uv pip install --system \
            "openhands-sdk @ git+https://github.com/OpenHands/software-agent-sdk.git@main#subdirectory=openhands-sdk" \
            "openhands-tools @ git+https://github.com/OpenHands/software-agent-sdk.git@main#subdirectory=openhands-tools"

      - name: Download agent script
        run: |
          curl -sSL \
            "https://raw.githubusercontent.com/OpenHands/extensions/main/plugins/pr-review/scripts/agent_script.py" \
            -o agent_script.py

      - name: Run PR Review
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: openrouter/anthropic/claude-3.5-haiku
          LLM_BASE_URL: https://openrouter.ai/api/v1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_STYLE: standard
        run: python agent_script.py
