name: PR Review by OpenHands

on:
  pull_request:
    types: [labeled, review_requested, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-review:
    if: |
      github.event.label.name == 'review-this' ||
      github.event.requested_reviewer.login == 'openhands-agent' ||
      github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenHands action
        uses: actions/checkout@v4
        with:
          repository: OpenHands/software-agent-sdk
          ref: main
          sparse-checkout: .github/actions/pr-review

      - name: Run PR Review
        uses: ./.github/actions/pr-review
        with:
          llm-model: openrouter/anthropic/claude-3.5-haiku
          llm-base-url: https://openrouter.ai/api/v1
          review-style: standard
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
